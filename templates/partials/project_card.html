<div class="col-md-6 col-xl-4">
    <article class="card project-card h-100">
        {% if project.image %}
            <img src="{{ project.image.url }}" class="card-img-top" alt="{{ project.title }}">
        {% else %}
            <div class="project-placeholder"><i class="bi bi-code-slash"></i></div>
        {% endif %}
        <div class="card-body d-flex flex-column">
            <span class="tech-pill">{{ project.tech_stack }}</span>
            <h3 class="card-title mt-3">{{ project.title }}</h3>
            <p class="card-text">{{ project.description|truncatewords:24 }}</p>
            <div class="mt-auto d-flex gap-2">
                {% if project.github_link %}<a href="{{ project.github_link }}" class="btn btn-sm btn-outline-primary" target="_blank" rel="noopener"><i class="bi bi-github me-1"></i>Code</a>{% endif %}
                {% if project.live_link %}<a href="{{ project.live_link }}" class="btn btn-sm btn-primary" target="_blank" rel="noopener"><i class="bi bi-box-arrow-up-right me-1"></i>Live</a>{% endif %}
            </div>
        </div>
    </article>
</div>
